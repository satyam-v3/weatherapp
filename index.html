<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <!-- Link Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Wrapper -->
    <div class="wrapper">

        <!-- Heading -->
        <h1>
            Weather App
        </h1>

        <!-- Tab Container -->
        <div class="tab-container">
            <p class="tab" data-UserWeather>Your Weather</p>
            <p class="tab" data-SearchWeather>Search Weather</p>
        </div>

        <!-- Weather Container -->
        <div class="weather-container">

            <!-- Grant Location Container -->
            <div class="subContainer grant-location-container">
                <img src="./Images/location.png" alt="location" width="80" height="80" loading="lazy">
                <p>Grant Location Access</p>
                <p>Allow Access to get weather Information</p>
                <button class="btn" data-grantAccess>Grant Access</button>
            </div>

            <!-- Search Weather Section -->
            <form class="form-container" data-searchForm>
                <input placeholder="Search for City..." data-searchInput>
                <button class="btn" type="submit">
                    <img src="./Images/search.png" alt="Search" width="20" height="20" loading="lazy">
                </button>
            </form>

            <!-- Loading Screen Container -->
            <div class="subContainer loading-container">
                <img src="./Images/loading.gif" alt="" width="150" height="150">
                <p>loading</p>
            </div>

            <!-- Show weather info -->
            <div class="subContainer user-info-container">

                <!-- City Name & Flag -->
                <div class="name">
                    <p data-cityName></p>
                    <img data-countryIcon>
                </div>

                <!-- Weather Description -->
                <p data-weatherDesc></p>

                <!-- Weather Icon -->
                <img data-weatherIcon>

                <!-- Temperature -->
                <p data-temp></p>

                <!-- 3 Cards - parameters -->
                <div class="parameter-container">

                    <!-- Card 1 -->
                    <div class="parameter">
                        <img src="./Images/wind.png" alt="" loading="lazy">
                        <p>Windspeed</p>
                        <p data-windSpeed></p>
                    </div>

                    <!-- Card 2 -->
                    <div class="parameter">
                        <img src="./Images/humidity.png" alt="" loading="lazy">
                        <p>Humidity</p>
                        <p data-humidity></p>
                    </div>

                    <!-- Card 3 -->
                    <div class="parameter">
                        <img src="./Images/cloud.png" alt="" loading="lazy">
                        <p>Clouds</p>
                        <p data-cloudiness></p>
                    </div>
                </div>
            </div>

            <!--  -->
            <div class="errorContainer">
                <img data-errorImg src="./Images/not-found.png" alt="Error" width="150" height="150">
                <p data-errorText></p>
                <button class="btn" data-errorButton>Retry</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
